name: Deploy Web Export to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Godot web export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.6.2.stable ~/.local/share/godot/export_templates/4.6.2.stable

      - name: Strip editor-only MCP addon from project for release export
        run: |
          # godot_mcp is an editor-time AI-control bridge (websocket server,
          # runtime debugger hooks). No reason to carry a reference to it
          # in a public web build — see SECURITY.md for context.
          sed -i '/^MCPGameBridge=/d' project.godot
          sed -i 's|enabled=PackedStringArray("res://addons/godot_mcp/plugin.cfg")|enabled=PackedStringArray()|' project.godot

      - name: Build web export
        run: |
          mkdir -p build/web
          godot --headless --import
          godot --headless --export-release "Web" build/web/index.html
          # Disable Jekyll processing so files starting with _ are served as-is
          touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
